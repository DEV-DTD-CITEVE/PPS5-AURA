services:
  aura:
    image: node:20-alpine
    container_name: pps5-aura
    working_dir: /app
    volumes:
      - .:/app
      - aura_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3847:3847"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3847
      - REACT_APP_API_BASE_URL=http://192.168.55.49:8055
      - REACT_APP_REALTIME_BASE_URL=http://192.168.55.49:8055
      - API_PROXY_TARGET=http://host.docker.internal:8055
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - BROWSER=none
    command: sh -c "npm install && npm start"
    stdin_open: true
    tty: true
volumes:
  aura_node_modules:
